name: Daily Social Media Post

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC — runs every day
    - cron: "30 3 * * *"
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit posted_log.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run daily poster
        env:
          # Facebook / Instagram (Meta Graph API)
          FB_ACCESS_TOKEN:       ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID:            ${{ secrets.FB_PAGE_ID }}
          IG_ACCESS_TOKEN:       ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:            ${{ secrets.IG_USER_ID }}
          # X (Twitter) API v2
          TWITTER_API_KEY:       ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:    ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:  ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          # LinkedIn
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID:    ${{ secrets.LINKEDIN_PERSON_ID }}
          # YouTube (Google OAuth2)
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          # GitHub context (auto-provided)
          GITHUB_REPOSITORY:     ${{ github.repository }}
          GITHUB_REF_NAME:       ${{ github.ref_name }}
        run: python scripts/post_daily.py

      - name: Commit updated log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_log.json
          git diff --staged --quiet || git commit -m "chore: update posted_log.json [skip ci]"
          git push
